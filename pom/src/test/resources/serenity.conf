serenity {
    take.screenshots = FOR_EACH_ACTION
    restart.browser.for.each = scenario
    encoding = "UTF-8"
    report.encoding = "UTF-8"
    compress.filenames = true
    timeout = 10000
}

headless.mode = false

webdriver {
  driver = chrome
  base.url = "http://localhost:3000"
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = ["remote-allow-origins=*","test-type", "no-sandbox", "ignore-certificate-errors", "--window-size=1920,1080", "--start-maximized",
        "disable-infobars", "disable-gpu", "disable-default-apps", "disable-popup-blocking",
        "disable-dev-shm-usage", "disable-extensions", "disable-web-security", "disable-translate", "disable-logging"]
    }
  }
  wait.for.timeout = 10000
  timeouts.implicitlywait = 5000
}